<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Производственный журнал</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .table-container {
            width: 100%;
            overflow-x: auto; /* Прокрутка, если таблица широкая */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }
        th { background-color: rgba(255, 255, 255, 0.2); font-size: 0.9em; }
        tr:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <h1>Производственный журнал</h1>
    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Дата</th><th>Заказчик</th><th>Ø Исходный</th><th>Ø Готовый</th>
                    <th>Кол-во</th><th>Подпись</th><th>Марка</th>
                    <th>Темп.</th><th>Выдержка</th><th>Программа</th><th>Режим</th><th>П</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGYLU0H2jMcsMZ6-VaCSecnUj66la3RXxKSAMtYftWmwHm3RCH7xRfMNEZN2aBX95kR5q5cLWncJKt/pub?gid=0&single=true&output=csv'; 

        fetch(csvUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const headers = lines[0].split(',');
                
                // Выводим заголовки прямо на страницу для проверки
                const tableBody = document.getElementById('table-body');
                const headerRow = document.createElement('tr');
                headerRow.innerHTML = `<td colspan="12" style="color: yellow; text-align: center;">
                    ТЕСТОВАЯ ПРОВЕРКА (Порядок столбцов): ${headers.join(' | ')}
                </td>`;
                tableBody.appendChild(headerRow);
                
                // Дальше ваш код...
            })
            .catch(err => {
                console.error("Ошибка загрузки:", err);
            });
    </script>
</body>
</html>
