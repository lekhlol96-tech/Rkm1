<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Производственный журнал</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 20px; }
        table {
            width: 90%;
            max-width: 1000px;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        th { background-color: rgba(255, 255, 255, 0.2); text-transform: uppercase; }
        tr:hover { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <h1>Производственный журнал</h1>
    <table id="data-table">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Заказчик</th>
                <th>Диаметр</th>
                <th>Количество</th>
                <th>Температура</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        // Вставьте сюда вашу ссылку на CSV файл (из Google Таблиц)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGYLU0H2jMcsMZ6-VaCSecnUj66la3RXxKSAMtYftWmwHm3RCH7xRfMNEZN2aBX95kR5q5cLWncJKt/pub?gid=0&single=true&output=csv';

        fetch(csvUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Пропускаем заголовок таблицы
                const tableBody = document.getElementById('table-body');
                
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 5) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${cols[1]}</td> <td>${cols[2]}</td> <td>Ø ${cols[3]}</td> <td>${cols[4]} шт.</td> <td>${cols[5]} °C</td> `;
                        tableBody.appendChild(tr);
                    }
                });
            });
    </script>
</body>
</html>
